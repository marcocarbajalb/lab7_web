<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Snake Game</title>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
      body {
        background-color: #1a1a1a;
        color: white;
        font-family: monospace;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }

      .board {
        display: grid;
        grid-template-columns: repeat(20, 20px);
        grid-template-rows: repeat(20, 20px);
        border: 2px solid white;
      }

      .cell {
        width: 20px;
        height: 20px;
        border: 1px solid #2a2a2a;
      }

      .cell { transition: background-color 0.08s; }
      .cell.snake { background-color: rgb(69, 187, 95); }
      .cell.food  { background-color: rgb(149, 7, 7); }

      /* Pantalla de inicio / Game Over */
      .overlay {
        position: fixed;
        inset: 0;
        background-color: rgba(0, 0, 0, 0.78);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
      }

      .overlay h2 { font-size: 20px; letter-spacing: 2px; }
      .overlay p  { font-size: 11px; color: #aaa; }

      .overlay button {
        margin-top: 8px;
        padding: 10px 24px;
        font-family: monospace;
        font-size: 13px;
        background-color: rgb(69, 187, 95);
        color: #111;
        border: none;
        cursor: pointer;
        font-weight: bold;
      }

      .overlay button:hover { opacity: 0.85; }
    </style>
  </head>

  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect, useRef } = React;

      const COLS = 20;
      const ROWS = 20;

      const INITIAL_SNAKE = [
        { x: 10, y: 10 },
        { x: 9,  y: 10 },
        { x: 8,  y: 10 },
      ];

      // Muestra el puntaje actual
      function Score({ score }) {
        return <p>Puntaje: {score}</p>;
      }

      // Renderiza los segmentos de la serpiente
      function Snake({ segments }) {
        return (
          <>
            {segments.map((seg, i) => (
              <div key={i} className="cell snake" />
            ))}
          </>
        );
      }

      // Renderiza la comida en el tablero
      function Food({ position }) {
        return <div className="cell food" />;
      }

      // Renderiza el tablero como una grilla de celdas
      function Board({ snakeSegments, foodPosition }) {
        const cells = [];

        for (let row = 0; row < ROWS; row++) {
          for (let col = 0; col < COLS; col++) {
            const isSnake = snakeSegments.some(s => s.x === col && s.y === row);
            const isFood  = foodPosition.x === col && foodPosition.y === row;

            let className = "cell";
            if (isSnake) className += " snake";
            if (isFood)  className += " food";

            cells.push(<div key={`${row}-${col}`} className={className} />);
          }
        }

        return <div className="board">{cells}</div>;
      }

      // Pantalla de inicio y de game over
      function Overlay({ gameOver, score, onStart }) {
        return (
          <div className="overlay">
            <h2>{gameOver ? "GAME OVER" : "SNAKE"}</h2>
            {gameOver && <p>Puntaje final: {score}</p>}
            <p>Usa las flechas del teclado para moverte</p>
            <button onClick={onStart}>
              {gameOver ? "Jugar de nuevo" : "Jugar"}
            </button>
          </div>
        );
      }

      // Componente principal: maneja el estado del juego
      function Game() {
        const [snake, setSnake]     = useState(INITIAL_SNAKE);
        const [food, setFood]       = useState({ x: 15, y: 10 });
        const [score, setScore]     = useState(0);
        const [gameOver, setGameOver] = useState(false);
        const [started, setStarted] = useState(false);

        // useRef para la dirección: el intervalo siempre lee el valor
        // más reciente sin necesitar reiniciarse cuando cambia la tecla
        const directionRef = useRef({ x: 1, y: 0 });

        function handleStart() {
          setSnake(INITIAL_SNAKE);
          setFood({ x: 15, y: 10 });
          setScore(0);
          setGameOver(false);
          directionRef.current = { x: 1, y: 0 };
          setStarted(true);
        }

        // Captura las teclas de flecha y actualiza el ref
        useEffect(() => {
          function handleKeyDown(e) {
            const { x, y } = directionRef.current;

            // Evitar dirección inversa (ej: si vas a la derecha no puedes ir a la izquierda)
            if (e.key === "ArrowUp"    && y !== 1)  directionRef.current = { x: 0, y: -1 };
            if (e.key === "ArrowDown"  && y !== -1) directionRef.current = { x: 0, y: 1 };
            if (e.key === "ArrowLeft"  && x !== 1)  directionRef.current = { x: -1, y: 0 };
            if (e.key === "ArrowRight" && x !== -1) directionRef.current = { x: 1, y: 0 };
          }

          window.addEventListener("keydown", handleKeyDown);
          return () => window.removeEventListener("keydown", handleKeyDown);
        }, []);

        // Loop del juego: corre a ritmo constante, sin reiniciarse al cambiar dirección
        useEffect(() => {
          if (!started || gameOver) return;

          const interval = setInterval(() => {
            setSnake(prevSnake => {
              const { x: dx, y: dy } = directionRef.current;
              const head    = prevSnake[0];
              const newHead = { x: head.x + dx, y: head.y + dy };

              // Colisión con paredes
              if (newHead.x < 0 || newHead.x >= COLS || newHead.y < 0 || newHead.y >= ROWS) {
                setGameOver(true);
                return prevSnake;
              }

              // Colisión con sí misma
              if (prevSnake.some(s => s.x === newHead.x && s.y === newHead.y)) {
                setGameOver(true);
                return prevSnake;
              }

              // Come la comida: crece y genera nueva comida
              if (newHead.x === food.x && newHead.y === food.y) {
                setScore(prev => prev + 1);
                setFood({
                  x: Math.floor(Math.random() * COLS),
                  y: Math.floor(Math.random() * ROWS),
                });
                return [newHead, ...prevSnake];
              }

              // Movimiento normal
              return [newHead, ...prevSnake.slice(0, -1)];
            });
          }, 150);

          return () => clearInterval(interval);
        }, [started, gameOver, food]);

        return (
          <div>
            <Score score={score} />
            <Board snakeSegments={snake} foodPosition={food} />
            {(!started || gameOver) && (
              <Overlay gameOver={gameOver} score={score} onStart={handleStart} />
            )}
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<Game />);
    </script>
  </body>
</html>
